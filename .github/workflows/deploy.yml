name: Deploy to AWS EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR Public
        run: aws ecr-public get-login-password --region us-east-1 | docker login --username AWS --password-stdin public.ecr.aws

      - name: Build and push Docker image
        run: |
          docker build --target prod -t public.ecr.aws/d9i9y2v2/kastashenkova/task-management-api:latest .
          docker push public.ecr.aws/d9i9y2v2/kastashenkova/task-management-api:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            export AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}"
            export AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}"
            export AWS_DEFAULT_REGION="us-east-1"

            aws ecr-public get-login-password --region us-east-1 | \
              sudo -E docker login --username AWS --password-stdin public.ecr.aws

            sudo docker network create task-management-net 2>/dev/null || true

            sudo docker network connect task-management-net task-management-db 2>/dev/null || true

            sudo docker stop task-management-api 2>/dev/null || true
            sudo docker rm task-management-api 2>/dev/null || true

            sudo docker pull public.ecr.aws/d9i9y2v2/kastashenkova/task-management-api:latest

            sudo docker run -d \
              --name task-management-api \
              --restart unless-stopped \
              --network task-management-net \
              -p 80:8090 \
              -e SERVER_PORT=8090 \
              -e SERVER_CONTEXT_PATH=/api \
              -e DB_URL="jdbc:postgresql://task-management-db:5432/task-management-system" \
              -e DB_USERNAME="${{ secrets.DB_USERNAME }}" \
              -e DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -e JWT_EXPIRATION=900000 \
              -e JWT_REFRESH_EXPIRATION=3000000 \
              -e JWT_ISSUER=task-management-app \
              -e JWT_AUDIENCE=task-management-api \
              -e DROPBOX_ACCESS_TOKEN="${{ secrets.DROPBOX_ACCESS_TOKEN }}" \
              -e GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
              -e GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
              -e GOOGLE_REDIRECT_URI="${{ secrets.GOOGLE_REDIRECT_URI }}" \
              -e MAIL_USERNAME="${{ secrets.MAIL_USERNAME }}" \
              -e MAIL_PASSWORD="${{ secrets.MAIL_PASSWORD }}" \
              -e META_ACCESS_TOKEN="${{ secrets.META_ACCESS_TOKEN }}" \
              -e PHONE_NUMBER_ID="${{ secrets.PHONE_NUMBER_ID }}" \
              public.ecr.aws/d9i9y2v2/kastashenkova/task-management-api:latest
