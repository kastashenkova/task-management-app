server.port=8090
server.servlet.context-path=/api
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.defer-datasource-initialization=true
spring.liquibase.enabled=false
jwt.secret=test-secret-key-for-testing-purposes-only-minimum-256-bits-long
jwt.expiration=900000
jwt.refresh.expiration=3000000
jwt.issuer=test-issuer
jwt.audience=test-audience
spring.mail.host=localhost
spring.mail.username=test@test.com
spring.mail.password=test
google.client.id=test-client-id
google.client.secret=test-client-secret
google.redirect.uri=http://localhost/oauth2/callback
dropbox.app-key=test-app-key
dropbox.app-secret=test-app-secret
dropbox.refresh-token=test-refresh-token
whatsapp.api.token=test-token
whatsapp.api.phone-number-id=test-phone-id