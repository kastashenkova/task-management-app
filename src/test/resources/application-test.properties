SERVER_PORT=8090
SERVER_CONTEXT_PATH=/api
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.defer-datasource-initialization=true
spring.liquibase.enabled=false
jwt.secret=test-secret-key-for-testing-purposes-only-minimum-256-bits-long
jwt.expiration=900000
jwt.refresh.expiration=3000000
jwt.issuer=test-issuer
jwt.audience=test-audience
MAIL_USERNAME=test@test.com
MAIL_PASSWORD=test
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
# stub values
GOOGLE_CLIENT_ID=test-client-id
GOOGLE_CLIENT_SECRET=test-client-secret
GOOGLE_REDIRECT_URI=http://localhost/oauth2/callback
DROPBOX_ACCESS_TOKEN=test-token
META_ACCESS_TOKEN=test-token
PHONE_NUMBER_ID=test-phone-id
