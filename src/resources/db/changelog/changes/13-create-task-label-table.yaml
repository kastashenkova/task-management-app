databaseChangeLog:
  - changeSet:
      id: 13-create-task-label-table
      author: kastashenkova
      changes:
        - createTable:
            tableName: task_label
            columns:
              - column:
                  name: task_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: label_id
                  type: bigint
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: task_label
            columnNames: task_id, label_id
            constraintName: pk_task_label
        - addForeignKeyConstraint:
            baseTableName: task_label
            baseColumnNames: task_id
            referencedTableName: tasks
            referencedColumnNames: id
            constraintName: fk_task
        - addForeignKeyConstraint:
            baseTableName: task_label
            baseColumnNames: label_id
            referencedTableName: labels
            referencedColumnNames: id
            constraintName: fk_label
